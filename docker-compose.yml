# SuiEdge Memory Gateway — one-command public deploy.
#
# Usage:
#   cp .env.testnet.example .env.compose   # then fill in SUI_PRIVATE_KEY
#   docker compose --env-file .env.compose up
#
# What you get:
#   - The gateway running at http://localhost:3000
#   - SQLite file at /var/lib/suiedge/dev.db (named volume, persists across restarts)
#   - Walrus testnet endpoints (the public ones — no need to run a local stub)
#   - Optional offline mode: comment out SUI_CLIENT_LIVE / SUI_PRIVATE_KEY in
#     .env.compose and the gateway will use MockSuiClient + MemoryWalrusPublisher
#     with an in-process SQLite seeded by scripts/seed.ts
#
# For a real production deploy, set:
#   SUI_CLIENT_LIVE=1
#   SUI_PRIVATE_KEY=<bech32 suiprivkey1...>
#   SUI_PACKAGE_ID=<your published package id>
#   WALRUS_PUBLISHER_URL=https://publisher.walrus-mainnet.walrus.space
#   WALRUS_AGGREGATOR_URL=https://aggregator.walrus-mainnet.walrus.space
#   AUTH_STUB_PASS=0

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: suiedge:local
    container_name: suiedge-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Public Walrus testnet by default. Override for mainnet.
      WALRUS_PUBLISHER_URL: ${WALRUS_PUBLISHER_URL:-https://publisher.walrus-testnet.walrus.space}
      WALRUS_AGGREGATOR_URL: ${WALRUS_AGGREGATOR_URL:-https://aggregator.walrus-testnet.walrus.space}
      WALRUS_EPOCHS: ${WALRUS_EPOCHS:-1}
      # Sui. If SUI_CLIENT_LIVE=0, the gateway uses MockSuiClient (no chain calls).
      SUI_CLIENT_LIVE: ${SUI_CLIENT_LIVE:-0}
      SUI_PACKAGE_ID: ${SUI_PACKAGE_ID:-}
      SUI_PRIVATE_KEY: ${SUI_PRIVATE_KEY:-}
      SUI_GAS_BUDGET: ${SUI_GAS_BUDGET:-50000000}
      # Auth. 1 lets demos skip the wallet-signature step.
      AUTH_STUB_PASS: ${AUTH_STUB_PASS:-1}
      # SQLite file — must be on a persistent volume in production.
      DB_PATH: /var/lib/suiedge/dev.db
      NODE_ENV: production
      PORT: 3000
    volumes:
      - suiedge-data:/var/lib/suiedge
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/v1/spaces').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  suiedge-data:
    name: suiedge-data
